# H2 in-memory datasource with MySQL compatibility mode
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL;NON_KEYWORDS=VALUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Use H2 dialect so Hibernate generates H2-compatible DDL (no ENGINE=InnoDB, no MySQL-specific types)
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Disable Eureka for tests
eureka.client.enabled=false
spring.cloud.discovery.enabled=false
