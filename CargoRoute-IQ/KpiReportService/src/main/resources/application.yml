server:
  port: 2003

spring:
  application:
    name: REPORT-SERVICE

  datasource:
    url: jdbc:mysql://localhost:3306/cargoroute
    username: root
    password: root


  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.MySQL8Dialect

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka
  instance:
    prefer-ip-address: true
