server:
 port: 7070
spring:
 datasource:
  url: jdbc:mysql://localhost:3306/cargoroute
  username: root
  password: root
 jpa:
  show-sql: true
  hibernate:
   ddl-auto: update
  database-platform: org.hibernate.dialect.MySQLDialect
 application:
  name: BOOKING-SERVICE
eureka:
 instance:
  preferIpAddress: true
 client:
  serviceUrl:
   defaultZone: http://localhost:8761/eureka
  registryFetchIntervalSeconds: 5