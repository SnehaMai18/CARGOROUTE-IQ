server:
  port: 8001
 
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/cargoroute
    username: root
    password: root
 
  jpa:
    show-sql: true
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
 
  application:
    name: MANIFEST-SERVICE
 
  web:
    resources:
      static-locations: file:uploads/
 
eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka
 
pod:
  upload-dir: ${user.dir}/uploads/pods
 
file:
  upload-dir: ${user.dir}/uploads/manifests
 